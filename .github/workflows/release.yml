name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify version match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(grep '"version"' src/module.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: Tag $TAG_VERSION != module.json $MODULE_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DSP with Docker
        run: |
          docker build --output type=local,dest=/tmp/dsp-out .
          echo "Docker output contents:"
          find /tmp/dsp-out -type f

      - name: Package module
        run: |
          mkdir -p dist/dragonfly-hall
          cp /tmp/dsp-out/dsp.so dist/dragonfly-hall/dragonfly-hall.so
          cp src/module.json dist/dragonfly-hall/
          tar -czvf dragonfly-hall-module.tar.gz -C dist dragonfly-hall/
          echo "Tarball contents:"
          tar -tzvf dragonfly-hall-module.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dragonfly-hall-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          git fetch origin main
          git checkout -f main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "{\"version\":\"${VERSION}\",\"download_url\":\"https://github.com/${REPO}/releases/download/${TAG}/dragonfly-hall-module.tar.gz\"}" > release.json
          git add release.json
          git commit -m "chore: update release.json for ${TAG}" || echo "No changes"
          git push origin main
