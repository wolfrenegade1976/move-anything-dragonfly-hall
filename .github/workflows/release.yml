name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify version match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(grep '"version"' src/module.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker
        run: |
          docker build --output type=local,dest=dist/dragonfly-hall .

      - name: Copy module files
        run: |
          cp src/module.json dist/dragonfly-hall/
          [ -f src/ui.js ] && cp src/ui.js dist/dragonfly-hall/ || true

      - name: Create tarball
        run: |
          cd dist
          tar -czvf dragonfly-hall-module.tar.gz dragonfly-hall/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/dragonfly-hall-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git fetch origin main
          git checkout -f main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cat > release.json << REOF
          {
            "version": "${VERSION}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dragonfly-hall-module.tar.gz"
          }
          REOF
          git add release.json
          git commit -m "chore: update release.json for ${{ github.ref_name }}" || echo "No changes"
          git push origin main
