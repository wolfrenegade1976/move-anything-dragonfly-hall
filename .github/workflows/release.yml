name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify version match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(grep '"version"' src/module.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: Tag $TAG_VERSION != module.json $MODULE_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DSP with Docker
        run: |
          docker build -t dragonfly-hall-builder --target builder .
          docker create --name dsp-extract dragonfly-hall-builder
          docker cp dsp-extract:/build/dsp.so ./dsp.so
          docker rm dsp-extract
          ls -lh dsp.so
          file dsp.so

      - name: Package module
        run: |
          mkdir -p dist/dragonfly-hall
          cp dsp.so dist/dragonfly-hall/dragonfly-hall.so
          cp src/module.json dist/dragonfly-hall/
          ls -lh dist/dragonfly-hall/
          tar -czvf dragonfly-hall-module.tar.gz -C dist dragonfly-hall/
          ls -lh dragonfly-hall-module.tar.gz
          md5sum dragonfly-hall-module.tar.gz

      - name: Upload Release Asset
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Dragonfly Hall Reverb ${{ github.ref_name }}" \
            dragonfly-hall-module.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          git fetch origin main
          git checkout -f main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "{\"version\":\"${VERSION}\",\"download_url\":\"https://github.com/${REPO}/releases/download/${TAG}/dragonfly-hall-module.tar.gz\"}" > release.json
          git add release.json
          git commit -m "chore: update release.json for ${TAG}" || echo "No changes"
          git push origin main
